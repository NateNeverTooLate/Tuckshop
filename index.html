<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tuckshop Inventory</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
  body { font-family: system-ui, -apple-system, sans-serif; }

  .number-input-group {
    display: flex;
    align-items: center;
    gap: 6px;
    justify-content: flex-end;
  }

  .number-input-group input {
    width: 64px;
    text-align: center;
  }

  .number-btn {
    width: 30px;
    height: 30px;
    border-radius: 9999px;
    background: #f3f4f6;
  }

  /* MOBILE CARD MODE */
  @media (max-width: 640px) {

    table thead {
      display: none;
    }

    table, tbody, tr, td {
      display: block;
      width: 100%;
    }

    tr {
      background: white;
      margin-bottom: 12px;
      border-radius: 16px;
      padding: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    td {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      font-size: 14px;
    }

    td::before {
      font-weight: 600;
      color: #6b7280;
    }

    td:nth-child(1)::before { content: "Product"; }
    td:nth-child(2)::before { content: "Stock"; }
    td:nth-child(3)::before { content: "Price"; }
    td:nth-child(4)::before { content: "Sold"; }
    td:nth-child(5)::before { content: "Money"; }

  }
</style>

</head>

<body class="bg-gray-50 min-h-screen">

<div class="max-w-6xl mx-auto p-4">

  <div class="flex flex-col gap-3 mb-6">

        <tr>

  </div>

  <div id="totalRow" class="mt-6 text-right text-xl font-bold"></div>

</div>

<script>

const API_BASE = "/api";

let data = [];
let editMode = false;

/* ---------------- STORAGE ---------------- */

function saveLocal() {
  localStorage.setItem("tuck_data", JSON.stringify(data));
}

function loadLocal() {
  const local = localStorage.getItem("tuck_data");
  return local ? JSON.parse(local) : null;
}

/* ---------------- API ---------------- */

async function apiGet(file) {
  return fetch(`${API_BASE}/get?file=${file}`).then(r => r.json());
}

/* ---------------- LOAD ---------------- */

async function loadData() {
  const local = loadLocal();

  if (local) {
    data = local;
  } else {
    data = await apiGet("tuck.json");
  }

  renderTable();
}

/* ---------------- RENDER ---------------- */

function renderTable() {
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";

  let total = 0;

  data.forEach(item => {

    const money = (item.soldToday || 0) * (item.sellPrice || 0);
    total += money;

    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${item.product}</td>

      <td>
        <div class="number-input-group">
          <button onclick="changeStock(${item.id}, -1)" class="number-btn">-</button>
          <input value="${item.stock}" onchange="updateStock(${item.id}, this.value)">
          <button onclick="changeStock(${item.id}, 1)" class="number-btn">+</button>
        </div>
      </td>

      <td>R${item.sellPrice}</td>

      <td>
        <div class="number-input-group">
          <button onclick="changeSoldToday(${item.id}, -1)" class="number-btn">-</button>
          <input value="${item.soldToday}" onchange="updateSoldToday(${item.id}, this.value)">
          <button onclick="changeSoldToday(${item.id}, 1)" class="number-btn">+</button>
        </div>
      </td>

      <td class="text-green-600">R${money.toFixed(2)}</td>

      <td>${editMode ? `<button onclick="deleteItem(${item.id})">X</button>` : ""}</td>
    `;

    tbody.appendChild(row);
  });

  document.getElementById("totalRow").innerHTML =
    `Total: R${total.toFixed(2)}`;
}

/* ---------------- ACTIONS ---------------- */

window.changeStock = (id, d) => {
  const i = data.find(x => x.id === id);
  if (i) i.stock = Math.max(0, i.stock + d);
  saveLocal();
  renderTable();
};

window.changeSoldToday = (id, d) => {
  const i = data.find(x => x.id === id);
  if (i) i.soldToday = Math.max(0, i.soldToday + d);
  saveLocal();
  renderTable();
};

window.updateStock = (id, v) => {
  const i = data.find(x => x.id === id);
  if (i) i.stock = parseFloat(v) || 0;
  saveLocal();
};

window.updateSoldToday = (id, v) => {
  const i = data.find(x => x.id === id);
  if (i) i.soldToday = parseFloat(v) || 0;
  saveLocal();
};

/* ---------------- BUTTONS ---------------- */

window.toggleEditMode = () => {
  editMode = !editMode;
  renderTable();
};

window.refreshData = () => {
  localStorage.removeItem("tuck_data");
  loadData();
};

window.startAlgorithm = () => {
  // force recalculation (already automatic, but kept for button use)
  renderTable();
};

/* ---------------- INIT ---------------- */

loadData();

</script>

</body>
</html>
