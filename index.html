<script>

const API_BASE = "/api";

let data = [];
let editMode = false;

async function apiGet(file) {
  return fetch(`${API_BASE}/get?file=${file}`).then(r => r.json());
}

async function apiUpdate(file, content) {
  return fetch(`${API_BASE}/update`, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ file, content })
  });
}

async function saveData() {
  await apiUpdate("tuck.json", data);
}

async function loadData() {
  data = await apiGet("tuck.json");
  renderTable();
}

function renderTable() {
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";

  let total = 0;

  data.forEach(item => {

    item.moneyMadeToday = (item.soldToday || 0) * (item.sellPrice || 0);

    total += item.moneyMadeToday || 0;

    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${item.product}</td>

      <td>
        <div class="number-input-group">
          <button onclick="changeStock(${item.id}, -1)" class="number-btn">-</button>
          <input value="${item.stock}" onchange="updateStock(${item.id}, this.value)">
          <button onclick="changeStock(${item.id}, 1)" class="number-btn">+</button>
        </div>
      </td>

      <td>R${item.sellPrice}</td>

      <td>
        <div class="number-input-group">
          <button onclick="changeSoldToday(${item.id}, -1)" class="number-btn">-</button>
          <input value="${item.soldToday}" onchange="updateSoldToday(${item.id}, this.value)">
          <button onclick="changeSoldToday(${item.id}, 1)" class="number-btn">+</button>
        </div>
      </td>

      <td class="text-green-600">R${(item.moneyMadeToday || 0).toFixed(2)}</td>

      <td>
        ${editMode
          ? `<button onclick="deleteItem(${item.id})" class="text-red-600 font-bold">X</button>`
          : ""
        }
      </td>
    `;

    tbody.appendChild(row);
  });

  document.getElementById("totalRow").innerHTML =
    `Total: R${total.toFixed(2)}`;
}

window.changeStock = async (id, d) => {
  const i = data.find(x => x.id === id);

  if (i) {
    i.stock = Math.max(0, i.stock + d);
    await saveData();
  }

  renderTable();
};

window.changeSoldToday = async (id, d) => {
  const i = data.find(x => x.id === id);

  if (i) {
    i.soldToday = Math.max(0, i.soldToday + d);
    await saveData();
  }

  renderTable();
};

window.updateStock = async (id, v) => {
  const i = data.find(x => x.id === id);

  if (i) {
    i.stock = parseFloat(v) || 0;
    await saveData();
  }

  renderTable();
};

window.updateSoldToday = async (id, v) => {
  const i = data.find(x => x.id === id);

  if (i) {
    i.soldToday = parseFloat(v) || 0;
    await saveData();
  }

  renderTable();
};

window.toggleEditMode = () => {
  editMode = !editMode;
  renderTable();
};

window.refreshData = loadData;

window.addNewItem = async () => {

  const product = prompt("Product name?");
  if (!product) return;

  const sellPrice = parseFloat(prompt("Sell price?")) || 0;

  const newItem = {
    id: Date.now(),
    product,
    stock: 0,
    sellPrice,
    soldToday: 0,
    moneyMadeToday: 0
  };

  data.push(newItem);

  await saveData();
  renderTable();
};

window.deleteItem = async (id) => {

  data = data.filter(x => x.id !== id);

  await saveData();
  renderTable();
};

window.startAlgorithm = async () => {

  data.forEach(item => {
    item.moneyMadeToday =
      (item.soldToday || 0) * (item.sellPrice || 0);
  });

  await saveData();

  alert("Calculation complete.");

  renderTable();
};

loadData();

</script>
