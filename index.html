<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tuckshop Inventory</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .number-input-group {
      display: flex;
      align-items: center;
      gap: 4px;
      justify-content: flex-end;
    }
    .number-input-group input {
      width: 78px;
      font-size: 1.1rem;
      text-align: center;
    }
    .number-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      font-weight: bold;
      border-radius: 9999px;
      background-color: #f3f4f6;
      color: #374151;
    }
    .number-btn:active { background-color: #e5e7eb; transform: scale(0.95); }
    @media (max-width: 640px) {
      th, td { padding: 12px 8px; font-size: 0.95rem; }
      .table-container { min-width: 680px; }
      .number-input-group input { width: 70px; font-size: 1rem; }
      .number-btn { width: 28px; height: 28px; font-size: 1rem; }
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div class="max-w-6xl mx-auto p-4 sm:p-6">
    <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center mb-6 gap-4">
      <h1 class="text-2xl sm:text-3xl font-bold text-gray-800">Tuckshop Inventory</h1>
      <div class="flex flex-wrap gap-3">
        <a href="history.html" class="px-5 py-3 bg-blue-600 text-white rounded-xl hover:bg-blue-700 text-sm font-medium flex items-center justify-center gap-2">
          📜 History
        </a>
        <button onclick="refreshData()" class="px-5 py-3 bg-gray-600 text-white rounded-xl hover:bg-gray-700 text-sm font-medium flex-1 sm:flex-none">
          🔄 Refresh
        </button>
        <button onclick="toggleEditMode()" id="editBtn" class="px-5 py-3 bg-amber-600 text-white rounded-xl hover:bg-amber-700 text-sm font-medium flex-1 sm:flex-none">
          ✏️ Edit Mode
        </button>
        <button onclick="addNewItem()" class="px-5 py-3 bg-emerald-600 text-white rounded-xl hover:bg-emerald-700 text-sm font-medium flex-1 sm:flex-none">
          + Add Item
        </button>
        <button onclick="startAlgorithm()" class="px-6 py-3 bg-green-600 text-white rounded-xl hover:bg-green-700 text-base font-semibold flex-1 sm:flex-none">
          🚀 Start Algorithm
        </button>
        <button onclick="undoLastAction()" id="undoBtn" class="px-6 py-3 bg-orange-600 text-white rounded-xl hover:bg-orange-700 hidden flex-1 sm:flex-none">
          ↩️ Undo Last
        </button>
      </div>
    </div>

    <div class="bg-white rounded-3xl shadow-lg overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full table-container min-w-[680px]">
          <thead class="bg-gray-100 sticky top-0">
            <tr>
              <th class="px-4 sm:px-6 py-4 text-left font-semibold">Product</th>
              <th class="px-4 sm:px-6 py-4 text-right font-semibold">Stock</th>
              <th class="px-4 sm:px-6 py-4 text-right font-semibold">Price</th>
              <th class="px-4 sm:px-6 py-4 text-right font-semibold">Sold Today</th>
              <th class="px-4 sm:px-6 py-4 text-right font-semibold">Money Made Today</th>
              <th class="px-4 sm:px-6 py-4 w-12" id="actionHeader"></th>
            </tr>
          </thead>
          <tbody id="tableBody" class="divide-y text-sm sm:text-base"></tbody>
        </table>
      </div>
    </div>

    <div id="totalRow" class="mt-6 text-right text-lg sm:text-xl font-semibold text-gray-700 flex justify-end items-baseline gap-2"></div>
    <p class="text-center text-xs text-gray-400 mt-8">All changes auto-save to GitHub</p>
  </div>

  <script>
    // ==================== CONFIG ====================
    const OWNER = "NateNeverTooLate";
    const REPO = "Tuckshop";
    const BRANCH = "main";
    const DATA_FILE = "tuck.json";
    const HISTORY_FILE = "sales-history.json";
    const TOKEN = "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";
    // ===============================================

    let data = [];
    let undoData = null;
    let editMode = false;

    async function getSha(filePath) {
      const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${filePath}`, {
        headers: { Authorization: `token ${TOKEN}` }
      });
      if (!res.ok) throw new Error("File not found");
      const json = await res.json();
      return json.sha;
    }

    async function loadData() {
      try {
        const url = `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/${DATA_FILE}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error("Failed to load");
        data = await res.json();
      } catch (e) {
        console.error("Load failed:", e);
        alert("Could not load tuck.json");
      }
      renderTable();
    }

    // FIXED SAVE FUNCTION
    async function saveFile(filePath, contentData) {
      try {
        let sha = null;
        try { sha = await getSha(filePath); } catch (e) {}

        const jsonStr = JSON.stringify(contentData, null, 2);
        const content = btoa(unescape(encodeURIComponent(jsonStr)));

        const body = {
          message: filePath === DATA_FILE ? "Update inventory" : "Add sales history",
          content: content,
          branch: BRANCH
        };
        if (sha) body.sha = sha;

        const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${filePath}`, {
          method: "PUT",
          headers: { 
            Authorization: `token ${TOKEN}`, 
            "Content-Type": "application/json" 
          },
          body: JSON.stringify(body)
        });

        if (!res.ok) {
          console.error("GitHub save failed:", await res.text());
          alert("Failed to save to GitHub. Check your token or internet.");
          return false;
        }
        return true;
      } catch (e) {
        console.error("Save error:", e);
        alert("Save error occurred. Check console (F12).");
        return false;
      }
    }

    function renderTable() {
      const tbody = document.getElementById("tableBody");
      tbody.innerHTML = "";
      let totalMoney = 0;

      data.forEach(item => {
        totalMoney += item.moneyMadeToday || 0;

        const row = document.createElement("tr");
        row.innerHTML = `
          <td class="px-4 sm:px-6 py-4 font-medium">
            ${editMode ? 
              `<input type="text" value="${item.product}" class="w-full border border-gray-300 rounded-xl px-3 py-2 text-sm" onchange="updateProductName(${item.id}, this.value)">` : 
              item.product}
          </td>
          <td class="px-4 sm:px-6 py-4 text-right">
            <div class="number-input-group">
              <button onclick="changeStock(${item.id}, -1)" class="number-btn">-</button>
              <input type="number" min="0" value="${item.stock}" class="border border-gray-300 rounded-2xl px-3 py-3 font-mono focus:outline-none focus:border-blue-500" onchange="updateStock(${item.id}, this.value)">
              <button onclick="changeStock(${item.id}, 1)" class="number-btn">+</button>
            </div>
          </td>
          <td class="px-4 sm:px-6 py-4 text-right">
            ${editMode ? 
              `<input type="number" value="${item.sellPrice}" class="w-20 border border-gray-300 rounded-xl px-3 py-2 text-right" onchange="updatePrice(${item.id}, this.value)">` : 
              `R${item.sellPrice}`}
          </td>
          <td class="px-4 sm:px-6 py-4 text-right">
            <div class="number-input-group">
              <button onclick="changeSoldToday(${item.id}, -1)" class="number-btn">-</button>
              <input type="number" min="0" value="${item.soldToday}" class="border border-gray-300 rounded-2xl px-3 py-3 font-mono focus:outline-none focus:border-green-500" onchange="updateSoldToday(${item.id}, this.value)">
              <button onclick="changeSoldToday(${item.id}, 1)" class="number-btn">+</button>
            </div>
          </td>
          <td class="px-4 sm:px-6 py-4 text-right font-mono text-green-600">R${(item.moneyMadeToday || 0).toFixed(2)}</td>
          <td class="px-4 sm:px-6 py-4 text-center">
            ${editMode ? `<button onclick="deleteItem(${item.id})" class="text-red-600 hover:text-red-700 text-2xl font-bold">×</button>` : ''}
          </td>
        `;
        tbody.appendChild(row);
      });

      document.getElementById("totalRow").innerHTML = `
        <span class="text-gray-500">Total money made today:</span>
        <span class="text-3xl font-bold text-green-600 ml-2">R${totalMoney.toFixed(2)}</span>
      `;
    }

    // Add, Edit, Delete functions (same as before)
    window.addNewItem = async () => {
      const product = prompt("Enter Product Name:")?.trim();
      if (!product) return;
      const stock = parseFloat(prompt("Current Stock:", "0")) || 0;
      const price = parseFloat(prompt("Sell Price (R):", "10")) || 10;

      const newId = data.length ? Math.max(...data.map(i => i.id)) + 1 : 1;
      data.push({ id: newId, product, stock, sellPrice: price, soldToday: 0, moneyMadeToday: 0 });

      renderTable();
      await saveFile(DATA_FILE, data);
    };

    window.toggleEditMode = () => {
      editMode = !editMode;
      document.getElementById("editBtn").textContent = editMode ? "✅ Done Editing" : "✏️ Edit Mode";
      document.getElementById("actionHeader").textContent = editMode ? "Delete" : "";
      renderTable();
    };

    window.updateProductName = async (id, newName) => {
      const item = data.find(i => i.id === id);
      if (item && newName.trim()) item.product = newName.trim();
      await saveFile(DATA_FILE, data);
    };

    window.updatePrice = async (id, newPrice) => {
      const item = data.find(i => i.id === id);
      if (item) item.sellPrice = parseFloat(newPrice) || 0;
      await saveFile(DATA_FILE, data);
      renderTable();
    };

    window.deleteItem = async (id) => {
      if (!confirm("Delete this product?")) return;
      data = data.filter(i => i.id !== id);
      renderTable();
      await saveFile(DATA_FILE, data);
    };

    // +/- and update functions
    window.changeStock = async (id, delta) => {
      const item = data.find(i => i.id === id);
      if (item) {
        item.stock = Math.max(0, item.stock + delta);
        renderTable();
        await saveFile(DATA_FILE, data);
      }
    };

    window.changeSoldToday = async (id, delta) => {
      const item = data.find(i => i.id === id);
      if (item) {
        item.soldToday = Math.max(0, item.soldToday + delta);
        renderTable();
        await saveFile(DATA_FILE, data);
      }
    };

    window.updateSoldToday = async (id, value) => {
      const item = data.find(i => i.id === id);
      if (item) {
        item.soldToday = parseFloat(value) || 0;
        renderTable();
        await saveFile(DATA_FILE, data);
      }
    };

    window.updateStock = async (id, value) => {
      const item = data.find(i => i.id === id);
      if (item) {
        item.stock = Math.max(0, parseFloat(value) || 0);
        renderTable();
        await saveFile(DATA_FILE, data);
      }
    };

    // FIXED START ALGORITHM
    window.startAlgorithm = async () => {
      if (!confirm("Process all sales for today?\n\n• Stock will be reduced\n• Money made will be calculated\n• Record saved to History")) return;

      undoData = JSON.parse(JSON.stringify(data));
      document.getElementById("undoBtn").classList.remove("hidden");

      const historyEntry = {
        timestamp: new Date().toLocaleString('en-ZA', { dateStyle: 'medium', timeStyle: 'short' }),
        totalMoney: 0,
        items: []
      };

      data.forEach(item => {
        const sold = parseFloat(item.soldToday) || 0;
        if (sold > 0) {
          const money = Math.round(item.sellPrice * sold * 100) / 100;
          historyEntry.items.push({ product: item.product, sold: sold, moneyMade: money });
          historyEntry.totalMoney += money;

          item.stock = Math.max(0, item.stock - sold);
          item.moneyMadeToday = money;
          item.soldToday = 0;
        }
      });

      // Save changes
      await saveFile(DATA_FILE, data);

      // Save history
      let history = [];
      try {
        const res = await fetch(`https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/${HISTORY_FILE}`);
        if (res.ok) history = await res.json();
      } catch (e) {}

      history.unshift(historyEntry);
      await saveFile(HISTORY_FILE, history);

      renderTable();
      alert("✅ Sales processed successfully!\nStock updated + History saved");
    };

    window.undoLastAction = async () => {
      if (!undoData || !confirm("Undo last sales?")) return;
      data = JSON.parse(JSON.stringify(undoData));
      undoData = null;
      document.getElementById("undoBtn").classList.add("hidden");
      renderTable();
      await saveFile(DATA_FILE, data);
    };

    window.refreshData = () => loadData();

    // Initial load
    loadData();
  </script>
</body>
</html>
