<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tuckshop Inventory</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    input[type="number"] {
      width: 90px;
      font-size: 1.1rem;
    }
    @media (max-width: 640px) {
      input[type="number"] { width: 78px; font-size: 1rem; }
      th, td { padding: 12px 8px; font-size: 0.95rem; }
      .table-container { min-width: 620px; }
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div class="max-w-6xl mx-auto p-4 sm:p-6">
    <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center mb-6 gap-4">
      <h1 class="text-2xl sm:text-3xl font-bold text-gray-800">Tuckshop Inventory</h1>
      <div class="flex flex-wrap gap-3">
        <a href="history.html"
           class="px-5 py-3 bg-blue-600 text-white rounded-xl hover:bg-blue-700 text-sm font-medium flex-1 sm:flex-none flex items-center justify-center gap-2">
          📜 History
        </a>
        <button onclick="refreshData()"
                class="px-5 py-3 bg-gray-600 text-white rounded-xl hover:bg-gray-700 text-sm font-medium flex-1 sm:flex-none">
          🔄 Refresh
        </button>
        <button onclick="startAlgorithm()"
                class="px-6 py-3 bg-green-600 text-white rounded-xl hover:bg-green-700 text-base font-semibold flex-1 sm:flex-none">
          🚀 Start Algorithm
        </button>
        <button onclick="undoLastAction()" id="undoBtn"
                class="px-6 py-3 bg-orange-600 text-white rounded-xl hover:bg-orange-700 hidden flex-1 sm:flex-none">
          ↩️ Undo Last
        </button>
      </div>
    </div>

    <div class="bg-white rounded-3xl shadow-lg overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full table-container min-w-[620px]">
          <thead class="bg-gray-100 sticky top-0">
            <tr>
              <th class="px-4 sm:px-6 py-4 text-left font-semibold">Product</th>
              <th class="px-4 sm:px-6 py-4 text-right font-semibold">Stock<br><span class="text-xs font-normal text-gray-500">(tap to restock)</span></th>
              <th class="px-4 sm:px-6 py-4 text-right font-semibold">Price</th>
              <th class="px-4 sm:px-6 py-4 text-right font-semibold">Sold Today</th>
              <th class="px-4 sm:px-6 py-4 text-right font-semibold">Money Made Today</th>
            </tr>
          </thead>
          <tbody id="tableBody" class="divide-y text-sm sm:text-base"></tbody>
        </table>
      </div>
    </div>

    <div id="totalRow" class="mt-6 text-right text-lg sm:text-xl font-semibold text-gray-700 flex justify-end items-baseline gap-2"></div>
    <p class="text-center text-xs text-gray-400 mt-8">All changes auto-save to GitHub • Works offline until you refresh</p>
  </div>

  <script>
    // ==================== CONFIG ====================
    const OWNER = "NateNeverTooLate";
    const REPO = "Tuckshop";
    const BRANCH = "main";
    const DATA_FILE = "tuck.json";           // ← Fixed: consistent name
    const HISTORY_FILE = "sales-history.json";
    const TOKEN = "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";
    // ===============================================

    let data = [];
    let undoData = null;

    async function getSha(filePath) {
      const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${filePath}`, {
        headers: { Authorization: `token ${TOKEN}` }
      });
      if (!res.ok) throw new Error("File not found");
      const json = await res.json();
      return json.sha;
    }

    async function loadData() {
      try {
        const url = `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/${DATA_FILE}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error("Failed to load");
        data = await res.json();
      } catch (e) {
        console.error("Load failed:", e);
        alert("Could not load data. Make sure tuck.json exists in your repo.");
      }
      renderTable();
    }

    async function saveFile(filePath, contentData) {
      let sha = null;
      try {
        sha = await getSha(filePath);
      } catch (e) {}

      const content = btoa(JSON.stringify(contentData, null, 2));

      const body = {
        message: filePath === DATA_FILE ? "Update tuckshop data" : "Add daily sales to history",
        content: content,
        branch: BRANCH
      };
      if (sha) body.sha = sha;

      await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${filePath}`, {
        method: "PUT",
        headers: {
          Authorization: `token ${TOKEN}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify(body)
      });
    }

    function renderTable() {
      const tbody = document.getElementById("tableBody");
      tbody.innerHTML = "";
      let totalMoney = 0;

      data.forEach(item => {
        totalMoney += item.moneyMadeToday || 0;

        const row = document.createElement("tr");
        row.innerHTML = `
          <td class="px-4 sm:px-6 py-4 font-medium">${item.product}</td>
          <td class="px-4 sm:px-6 py-4 text-right">
            <input type="number" min="0" value="${item.stock}"
                   class="text-right border border-gray-300 rounded-2xl px-4 py-3 text-lg font-mono focus:outline-none focus:border-blue-500 w-[88px]"
                   onchange="updateStock(${item.id}, this.value)">
          </td>
          <td class="px-4 sm:px-6 py-4 text-right font-mono">R${item.sellPrice}</td>
          <td class="px-4 sm:px-6 py-4 text-right">
            <input type="number" min="0" value="${item.soldToday}"
                   class="text-right border border-gray-300 rounded-2xl px-4 py-3 text-lg focus:outline-none focus:border-green-500 w-[88px]"
                   onchange="updateSoldToday(${item.id}, this.value)">
          </td>
          <td class="px-4 sm:px-6 py-4 text-right font-mono text-green-600">R${item.moneyMadeToday || 0}</td>
        `;
        tbody.appendChild(row);
      });

      document.getElementById("totalRow").innerHTML = `
        <span class="text-gray-500">Total money made today:</span>
        <span class="text-3xl font-bold text-green-600 ml-2">R${totalMoney}</span>
      `;
    }

    window.updateSoldToday = async (id, value) => {
      const item = data.find(i => i.id === id);
      if (item) {
        item.soldToday = parseFloat(value) || 0;
        renderTable();
        await saveFile(DATA_FILE, data);
      }
    };

    window.updateStock = async (id, value) => {
      const item = data.find(i => i.id === id);
      if (item) {
        const newStock = parseFloat(value) || 0;
        if (newStock !== item.stock) {
          item.stock = newStock;
          renderTable();
          await saveFile(DATA_FILE, data);
        }
      }
    };

    window.startAlgorithm = async () => {
      if (!confirm("Process all sales for today?\n\n• Stock will be updated\n• Money made will be calculated\n• Sold Today resets to 0\n• This record will be saved to History")) return;

      undoData = JSON.parse(JSON.stringify(data));   // Save for undo
      document.getElementById("undoBtn").classList.remove("hidden");

      const historyEntry = {
        timestamp: new Date().toLocaleString('en-ZA', { dateStyle: 'medium', timeStyle: 'short' }),
        totalMoney: 0,
        items: []
      };

      data.forEach(item => {
        const sold = item.soldToday || 0;
        if (sold > 0) {
          const money = Math.round(item.sellPrice * sold * 100) / 100;
          historyEntry.items.push({ product: item.product, sold: sold, moneyMade: money });
          historyEntry.totalMoney += money;

          item.stock = Math.max(0, item.stock - sold);
          item.moneyMadeToday = money;
          item.soldToday = 0;
        }
      });

      await saveFile(DATA_FILE, data);

      // Save history
      let history = [];
      try {
        const res = await fetch(`https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/${HISTORY_FILE}`);
        if (res.ok) history = await res.json();
      } catch (e) {}
      
      history.unshift(historyEntry);
      await saveFile(HISTORY_FILE, history);

      renderTable();
      alert("✅ Sales processed!\nStock updated + record saved to History");
    };

    window.undoLastAction = async () => {
      if (!undoData) return;
      if (!confirm("Undo the last algorithm run?")) return;

      data = JSON.parse(JSON.stringify(undoData));
      undoData = null;
      document.getElementById("undoBtn").classList.add("hidden");
      renderTable();
      await saveFile(DATA_FILE, data);
      alert("✅ Last action undone");
    };

    window.refreshData = () => loadData();

    // Initial load
    loadData();
  </script>
</body>
</html>
