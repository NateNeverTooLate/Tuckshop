<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tuckshop Sales History</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .card { transition: 0.2s ease; }
    .card:hover { transform: scale(1.01); }
  </style>
</head>

<body class="bg-gray-50 min-h-screen">

<div class="max-w-4xl mx-auto p-4 sm:p-6">

  <!-- HEADER -->
  <div class="flex justify-between items-center mb-8">
    <h1 class="text-3xl font-bold text-gray-800">📜 Sales History</h1>

    <div class="flex gap-3 flex-wrap">

      <a href="index.html"
         class="px-5 py-3 bg-gray-700 text-white rounded-2xl hover:bg-gray-800 text-sm">
        ← Inventory
      </a>

      <button onclick="refreshHistory()"
              class="px-5 py-3 bg-blue-600 text-white rounded-2xl hover:bg-blue-700 text-sm">
        🔄 Refresh
      </button>

      <button onclick="clearTestEntries()"
              class="px-5 py-3 bg-red-600 text-white rounded-2xl hover:bg-red-700 text-sm">
        🧹 Remove Tests
      </button>

    </div>
  </div>

  <!-- CONTENT -->
  <div id="historyContainer" class="space-y-6"></div>

  <p id="emptyMessage" class="text-center text-gray-400 py-12 hidden">
    No sales recorded yet.
  </p>

</div>

<script>

const API_BASE = "/api";
const FILE = "sales-history.json";

let historyData = [];

// ================= LOAD =================
async function loadHistory() {

  try {
    const res = await fetch(`${API_BASE}/get?file=${FILE}`);
    historyData = await res.json();
  } catch (e) {
    historyData = [];
  }

  if (!Array.isArray(historyData)) {
    historyData = [];
  }

  render();
}

// ================= SAVE =================
async function save() {

  await fetch(`${API_BASE}/update`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      file: FILE,
      content: historyData
    })
  });
}

// ================= DELETE =================
async function deleteEntry(index) {

  if (!confirm("Delete this history entry?")) return;

  historyData.splice(index, 1);

  await save();

  render();
}

// ================= REMOVE TESTS =================
async function clearTestEntries() {

  if (!confirm("Remove test entries?")) return;

  historyData = historyData.filter(e =>
    !(e.date || "").toLowerCase().includes("test")
  );

  await save();

  render();
}

// ================= RENDER =================
function render() {

  const container = document.getElementById("historyContainer");
  const emptyMsg = document.getElementById("emptyMessage");

  container.innerHTML = "";

  if (historyData.length === 0) {
    emptyMsg.classList.remove("hidden");
    return;
  }

  emptyMsg.classList.add("hidden");

  historyData.forEach((entry, i) => {

    const items = (entry.items || []).map(item => {

      const product = item.product || "Unknown";
      const sold = item.sold ?? 0;
      const money = item.money ?? 0;

      return `
        <div class="flex justify-between text-sm py-1 border-b">
          <span>${product} × ${sold}</span>
          <span class="text-green-600 font-medium">
            R${Number(money).toFixed(2)}
          </span>
        </div>
      `;
    }).join("");

    const div = document.createElement("div");

    div.className =
      "bg-white rounded-3xl shadow p-5 card";

    div.innerHTML = `
      <div class="flex justify-between items-center border-b pb-3">

        <p class="font-semibold text-lg">
          ${entry.date || "Unknown date"}
        </p>

        <p class="text-green-600 text-2xl font-bold">
          R${Number(entry.total || 0).toFixed(2)}
        </p>

      </div>

      <div class="mt-4 space-y-1">
        ${items || "<p class='text-gray-400'>No items</p>"}
      </div>

      <div class="mt-4 flex justify-end">
        <button onclick="deleteEntry(${i})"
                class="px-4 py-2 bg-red-500 text-white rounded-xl text-sm hover:bg-red-600">
          Delete Entry
        </button>
      </div>
    `;

    container.appendChild(div);
  });
}

// ================= INIT =================
window.refreshHistory = loadHistory;

loadHistory();

</script>

</body>
</html>
